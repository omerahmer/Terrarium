services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8080
    depends_on:
      - api

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - AI_SERVICE_URL=http://ai:8000
      # Comma-separated allowed CORS origins; defaults to the Vite dev server.
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:5173}
    depends_on:
      ai:
        condition: service_healthy
  ai:
    build:
      context: ./ai
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      # Bind IPv4 locally — the `api` container reaches this over the IPv4
      # `ai` hostname. (Railway uses the Dockerfile default of :: for its
      # IPv6-only private network.)
      - UVICORN_HOST=0.0.0.0
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
